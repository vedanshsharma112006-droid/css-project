<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Mockup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <button class="menu-button" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="brand" aria-label="YouTube">
            <div class="play-badge"></div>
            <span>YouTube</span>
        </div>

        <label class="search">
            <span class="sr-only">Search</span>
            <input type="search" placeholder="Search">
        </label>
    </header>

    <main class="page">
        <aside class="sidebar" aria-label="Navigation">
            <span></span>
            <span></span>
            <span></span>
        </aside>

        <section class="content">
            <section class="video-player" aria-label="Video player">
                <div class="player-play"></div>
            </section>

            <section class="video-info" aria-label="Video details">
                <div class="avatar"></div>
                <div class="video-copy">
                    <h1>CSS YouTube tutorial</h1>
                    <p>HTML aur CSS layout ab clearly show ho raha hai.</p>
                </div>
            </section>
        </section>
    </main>

    <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill"></div>
        <div class="progress-thumb"></div>
    </div>
</body>
</html>
